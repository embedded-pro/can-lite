---
name: Continuous Integration

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  checks: write
  issues: read
  pull-requests: write

concurrency:
  group: ${{ github.ref }}-${{ github.workflow }}
  cancel-in-progress: true

env:
  CMAKE_BUILD_PARALLEL_LEVEL: 2
  GTEST_COLOR: 1

jobs:
  host_build_test_ubuntu:
    name: Host Build & Test (ubuntu-latest)
    runs-on: ubuntu-latest
    steps:
      - name: Configure Git
        run: |
          git config --global url."https://${{ secrets.PRIVATE_REPO_TOKEN }}@github.com/".insteadOf "https://github.com/"
          git config --global url."https://github.com/".insteadOf "git@github.com:"
          git config --global --add safe.directory '${{ github.workspace }}'
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          submodules: recursive
      - uses: hendrikmuhs/ccache-action@5ebbd400eff9e74630f759d94ddd7b6c26299639 # v1.2.20
        with:
          key: ${{ github.job }}-ubuntu-latest
          max-size: 2G
          save: ${{ github.ref == 'refs/heads/main' }}
      - uses: seanmiddleditch/gha-setup-ninja@3b1f8f94a2f8254bd26914c4ab9474d4f0015f67 # v6
      - uses: lukka/run-cmake@af1be47fd7c933593f687731bc6fdbee024d3ff4 # v10.8
        with:
          configurePreset: "host"
          buildPreset: "host-Debug-WithPackage"
          testPreset: "host"
          configurePresetAdditionalArgs: "['-DCMAKE_C_COMPILER_LAUNCHER=ccache', '-DCMAKE_CXX_COMPILER_LAUNCHER=ccache']"
      - name: Run Integration Tests
        run: |
          integration_test=$(find build/host -name "can_lite.integration_tests" -type f -executable -print -quit)
          if [[ -z "$integration_test" ]]; then
            echo "::error::Integration test executable not found"
            exit 1
          fi
          $integration_test --format summary pretty junit:integration-test-report.xml -- integration_tests/features
      - name: Generate Integration Test Summary
        if: always()
        run: |
          {
            echo "## Integration Test Results"
            echo ""
            python3 -c "
          import xml.etree.ElementTree as ET
          tree = ET.parse('integration-test-report.xml')
          root = tree.getroot()
          suites = root.findall('.//testsuite') if root.tag == 'testsuites' else [root]
          features = {}
          for suite in suites:
              for tc in suite.findall('testcase'):
                  feature = tc.get('classname', 'Unknown')
                  name = tc.get('name', 'Unknown')
                  failed = tc.find('failure') is not None
                  skipped = tc.find('skipped') is not None
                  status = ':x:' if failed else ':zzz:' if skipped else ':white_check_mark:'
                  features.setdefault(feature, []).append((name, status))
          for feature, scenarios in features.items():
              print(f'### {feature}')
              print('| Scenario | Status |')
              print('|---|---|')
              for name, status in scenarios:
                  print(f'| {name} | {status} |')
              print()
          "
          } >> "$GITHUB_STEP_SUMMARY"
      - uses: EnricoMi/publish-unit-test-result-action@c950f6fb443cb5af20a377fd0dfaa78838901040 # v2.23.0
        if: always()
        with:
          check_name: Integration Test Results
          comment_title: Integration Test Results
          files: integration-test-report.xml
          report_individual_runs: true
          report_suite_logs: info
      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: can_lite
          path: build/host/can_lite-*-Linux.tar.gz
          if-no-files-found: error
      - name: Upload test logs
        if: ${{ failure() }}
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: test-logs
          path: build/host/Testing/Temporary/
  host_build_test:
    name: Host Build & Test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, windows-latest]
    steps:
      - name: Configure Git
        run: |
          git config --global url."https://${{ secrets.PRIVATE_REPO_TOKEN  }}@github.com/".insteadOf "https://github.com/"
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          submodules: recursive
      - uses: hendrikmuhs/ccache-action@5ebbd400eff9e74630f759d94ddd7b6c26299639 # v1.2.20
        with:
          key: ${{ github.job }}-${{ matrix.os }}
          max-size: 2G
          save: ${{ github.ref == 'refs/heads/main' }}
      - uses: lukka/run-cmake@af1be47fd7c933593f687731bc6fdbee024d3ff4 # v10.8
        with:
          configurePreset: "host-single-Debug"
          buildPreset: "host-single-Debug"
          testPreset: "host-single-Debug"
          configurePresetAdditionalArgs: "['-DCMAKE_C_COMPILER_LAUNCHER=ccache', '-DCMAKE_CXX_COMPILER_LAUNCHER=ccache']"
      - name: Upload test logs
        if: ${{ failure() }}
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: test-logs
          path: build/host/Testing/Temporary/

